<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="fivefiftyfive is a web development company creating quality websites to customer specifications, in addition to providing bespoke search engine optimization and competitive web hosting packages."
    />
    <meta
      name="keywords"
      content="website builder, search engine optimization, web hosting, web design, web developer"
    />
    <meta name="author" content="fivefiftyfive/wm" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@100;300;400;700&family=Raleway:wght@100;300;400;700&family=Roboto:wght@100;300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/scss/style.css" />
    <link rel="icon" type="image/png" href="/static/images/favicon.png" />
    <title>{% block title %}{% endblock %}</title>
  </head>
  <body>
    <div class="body-container"></div>
    <!-- Header -->
    <div class="header-container">
      <div class="header-content">
        <!-- Header logo -->
        <div class="header-logo">
          <a href="#"
            ><img
              class="header__logo"
              src="/static/images/fivefiftyfive.io.png"
          /></a>
        </div>
        <!-- Header navigation -->
        {% block nav %}{% endblock %}
        <!-- Header hamburger menu (mobile only) -->
        <div class="header-hamburger">
          <img
            class="header__hamburger"
            src="/static/images/icon-hamburger.svg"
          />
        </div>
        <!-- Header call-to-action button -->
        <div class="button">
          <a href="#">Get A Quote</a>
        </div>
      </div>
    </div>
    <!-- Hero section -->
    {% block hero %}{% endblock %}
    <!-- Features section -->
    {% block features %}{% endblock %}
    <!-- About Us section -->
    {% block aboutus %}{% endblock %}
    <!-- Testimonial section -->
    {% block testimonial %}{% endblock %}
    <!-- Call-to-action section -->
    {% block cta %}{% endblock %}
    <!-- Footer -->
  </body>
</html>
