<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="description" content="All things motorcycle" />
    <meta name="keywords" content="web developer, web design, web hosting" />
    <meta name="author" content="fivefiftyfive" />
    <link rel="stylesheet" href="/static/scss/style.css" />
    <link
      rel="icon"
      type="PNG file"
      href="/static/images/fivefiftyfive.io_logo.png"
    />
    <title>{% block title %}{% endblock title %}</title>
  </head>
  <body class="body-container overlay">
    <header class="header">
      <div class="header-container flex flex-jc-sb">
        <div class="header-logo flex">
          <div class="logo__image">
            <a href="#"
              ><img src="/static/images/fivefiftyfive.io_logo.png"
            /></a>
          </div>
          <div class="logo__name">
            <img src="/static/images/fivefiftyfive.io_name.png" />
          </div>
        </div>
        {% block header %}{% endblock header %}
      </div>
    </header>
    {% block body %}{% endblock body %}
    <footer></footer>
  </body>
</html>
