{% extends "layout.html" %}
<!-- Title -->
{% block title %}fivefiftyfive | landing page{% endblock %}
<!-- Background image -->
<img
  class="bg__image"
  src="/static/images/pexels-pixabay-461064.jpg"
  alt="Man's arms in a long-sleeved shirt seen from above typing on a laptop with a cup of black coffee to his left and a green houseplant to his right"
/>

<!-- Header -->
{% block header %}
<div class="header-container flex flex-jc-sb">
  <div class="header-logo flex">
    <div class="logo__image">
      <a href="#"><img src="/static/images/fivefiftyfive.io_logo.png" /></a>
    </div>
    <div class="logo__name">
      <img src="/static/images/fivefiftyfive.io_name.png" />
    </div>
  </div>

  <div class="header-links">
    <nav class="flex flex-jc-sa">
      <a href="#" class="header__link">Services</a>
      <a href="#" class="header__link">About/Contact</a>
      <a href="#" class="header__link">Blog</a>
    </nav>
  </div>
  <div class="header__hamburger">
    <img src="/static/images/icon-hamburger.svg" />
  </div>
</div>
{% endblock %}
<!-- Body content -->
{% block body %}{% endblock %}
